name: Force Update thetvapp Playlist

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'  # Hourly refresh

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies & Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright urllib3 aiohttp
          playwright install firefox
          playwright install-deps
          
      - name: Run scraping script
        run: python tv.py

      - name: Clone target repository
        env:
          TARGET_TOKEN2TS: ${{ secrets.TARGET_TOKEN2TS }}
          TARGET_URLTS: ${{ secrets.TARGET_URLTS }}
          TARGET_NAMETS: ${{ secrets.TARGET_NAMETS }}
        run: |
          git clone https://x-access-token:${TARGET_TOKEN2TS}@${TARGET_URLTS} ${TARGET_NAMETS}

      - name: Copy updated playlist to target repo (robust)
        env:
          TARGET_NAMETS: ${{ secrets.TARGET_NAMETS }}
          FILENAME: 'TheTVApp.m3u8'
        run: |
          echo "Looking for $FILENAME in workspace..."
          pwd
          ls -lah

          # find first matching file in workspace (handles if file is in subfolder)
          FILEPATH=$(find . -type f -name "$FILENAME" -print -quit || true)

          if [ -z "$FILEPATH" ]; then
            echo "❌ File $FILENAME not found in workspace!"
            # optional: show deeper listing to debug
            echo "Full workspace listing (first 200 lines):"
            ls -R | sed -n '1,200p'
            exit 1
          fi

          echo "Found file at: $FILEPATH"
          mkdir -p "$TARGET_NAMETS"
          cp "$FILEPATH" "$TARGET_NAMETS/$FILENAME"
          echo "✅ Copied $FILEPATH -> $TARGET_NAMETS/$FILENAME"

      - name: Force Commit & Push to target repository
        env:
          TARGET_NAMETS: ${{ secrets.TARGET_NAMETS }}
          TARGET_REPO_USER: ${{ secrets.TARGET_REPO_USER }}
          FILENAME: 'TheTVApp.m3u8'
        run: |
          cd "$TARGET_NAMETS"
          git config user.name "${TARGET_REPO_USER}"
          git config user.email "${TARGET_REPO_USER}@users.noreply.github.com"
          git add "$FILENAME"
          git commit --allow-empty -m "Force update $FILENAME playlist on $(date '+%Y-%m-%d %H:%M:%S')"
          git push || {
            echo "Push to target repo failed. Trying rebase..."
            git pull --rebase && git push || {
              echo "Push to target repo failed again."
              exit 1
            }
          }
