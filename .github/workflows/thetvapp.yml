name: 📺 Update TheTVApp Playlist

on:
  workflow_dispatch:   # ✅ Manual run button in GitHub Actions
  schedule:
    - cron: "0 */6 * * *"   # ⏰ Every 6 hours (UTC) — adjust as needed

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install firefox

      - name: ▶ Run TV scraper
        run: python tv.py

      - name: 📤 Commit and push if changed
        run: |
          git config --global user.name "TVAppBot"
          git config --global user.email "bot@example.com"
          git add -A  # ✅ add all changes, even if file is new
          git commit -m "Auto-update TheTVApp.m3u8 [skip ci]" || echo "No changes to commit"
          git push
