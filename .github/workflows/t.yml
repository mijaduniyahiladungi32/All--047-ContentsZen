name: Scrape and Update Bangla Channel Images

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at midnight UTC
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Explicitly grants write permissions for GITHUB_TOKEN
      actions: read    # Allows reading workflow data
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for accurate git operations

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests
          playwright install --with-deps chromium  # Installs Chromium for headless browsing

      - name: Run scrape script
        run: |
          python scrape.py
        continue-on-error: false  # Fail on script error for debugging

      - name: Check for changes
        id: check-changes
        run: |
          git diff --quiet images/ || echo "changes=true" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Commit and push changes
        if: steps.check-changes.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add images/ || true
          git commit -m "Auto-update: Scraped Bangla channel images from jagobd.com" || echo "No changes to commit"
          git push origin HEAD || echo "Push failed, check permissions or network"
